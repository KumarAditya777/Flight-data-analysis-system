import json
import os
import logging
from datetime import datetime, timedelta
from openai import OpenAI
from app import db
from models import MarketInsight
from collections import defaultdict

# Initialize OpenAI client
OPENAI_API_KEY = os.environ.get("OPENAI_API_KEY")
openai_client = OpenAI(api_key=OPENAI_API_KEY) if OPENAI_API_KEY else None

def analyze_market_trends(flight_data):
    """
    Analyze market trends from flight data using AI
    """
    try:
        if not openai_client:
            logging.warning("OpenAI API key not available")
            return generate_basic_analysis(flight_data)
        
        # Prepare data summary for AI analysis
        data_summary = prepare_data_summary(flight_data)
        
        # Generate AI insights
        ai_insights = get_ai_insights(data_summary)
        
        return ai_insights
        
    except Exception as e:
        logging.error(f"Error analyzing market trends: {str(e)}")
        return generate_basic_analysis(flight_data)

def prepare_data_summary(flight_data):
    """
    Prepare flight data summary for AI analysis
    """
    try:
        summary = {
            'total_flights': len(flight_data),
            'routes': defaultdict(list),
            'airlines': defaultdict(list),
            'price_ranges': defaultdict(list),
            'date_ranges': defaultdict(list)
        }
        
        for flight in flight_data:
            route = f"{flight.origin}-{flight.destination}"
            summary['routes'][route].append({
                'price': flight.price,
                'airline': flight.airline,
                'date': flight.departure_date.isoformat() if flight.departure_date else None
            })
            
            summary['airlines'][flight.airline].append({
                'price': flight.price,
                'route': route,
                'date': flight.departure_date.isoformat() if flight.departure_date else None
            })
            
            if flight.price:
                price_range = get_price_range(flight.price)
                summary['price_ranges'][price_range].append(route)
        
        # Calculate statistics
        summary['stats'] = calculate_statistics(flight_data)
        
        return summary
        
    except Exception as e:
        logging.error(f"Error preparing data summary: {str(e)}")
        return {}

def get_ai_insights(data_summary):
    """
    Get AI-generated insights from OpenAI
    """
    try:
        if not openai_client:
            return []
        
        prompt = f"""
        Analyze the following airline booking market data for Australian domestic flights and provide actionable insights for hostel business planning:

        Data Summary:
        {json.dumps(data_summary, indent=2)}

        Please provide insights in the following categories:
        1. Demand Trends: Which routes show highest/lowest demand
        2. Price Analysis: Price patterns and seasonal variations
        3. Market Opportunities: Underserved routes or price gaps
        4. Hostel Strategy: Specific recommendations for hostel locations and pricing
        5. Seasonal Patterns: Peak and off-peak travel periods

        Format your response as JSON with the following structure:
        {{
            "demand_trends": {{
                "summary": "brief summary",
                "top_routes": ["route1", "route2"],
                "insights": ["insight1", "insight2"]
            }},
            "price_analysis": {{
                "summary": "brief summary",
                "average_prices": {{"route": price}},
                "insights": ["insight1", "insight2"]
            }},
            "market_opportunities": {{
                "summary": "brief summary",
                "opportunities": ["opportunity1", "opportunity2"],
                "recommendations": ["rec1", "rec2"]
            }},
            "hostel_strategy": {{
                "summary": "brief summary",
                "location_recommendations": ["location1", "location2"],
                "pricing_strategy": ["strategy1", "strategy2"]
            }},
            "seasonal_patterns": {{
                "summary": "brief summary",
                "peak_periods": ["period1", "period2"],
                "insights": ["insight1", "insight2"]
            }}
        }}
        """
        
        # the newest OpenAI model is "gpt-4o" which was released May 13, 2024.
        # do not change this unless explicitly requested by the user
        response = openai_client.chat.completions.create(
            model="gpt-4o",
            messages=[
                {
                    "role": "system",
                    "content": "You are an expert travel industry analyst specializing in Australian domestic airline markets and hostel business strategy. Provide detailed, actionable insights based on flight booking data."
                },
                {
                    "role": "user",
                    "content": prompt
                }
            ],
            response_format={"type": "json_object"},
            temperature=0.7
        )
        
        content = response.choices[0].message.content
        if content is None:
            raise ValueError("No content received from OpenAI response")
        ai_response = json.loads(content)
        
        # Save insights to database
        save_insights_to_db(ai_response, data_summary['stats'])
        
        return format_insights_for_display(ai_response)
        
    except Exception as e:
        logging.error(f"Error getting AI insights: {str(e)}")
        return []

def calculate_statistics(flight_data):
    """
    Calculate basic statistics from flight data
    """
    try:
        if not flight_data:
            return {}
        
        prices = [f.price for f in flight_data if f.price]
        
        stats = {
            'total_flights': len(flight_data),
            'avg_price': sum(prices) / len(prices) if prices else 0,
            'min_price': min(prices) if prices else 0,
            'max_price': max(prices) if prices else 0,
            'unique_routes': len(set(f"{f.origin}-{f.destination}" for f in flight_data)),
            'unique_airlines': len(set(f.airline for f in flight_data if f.airline))
        }
        
        return stats
        
    except Exception as e:
        logging.error(f"Error calculating statistics: {str(e)}")
        return {}

def get_price_range(price):
    """
    Categorize price into ranges
    """
    if price < 200:
        return "Budget (Under $200)"
    elif price < 400:
        return "Mid-range ($200-$400)"
    elif price < 600:
        return "Premium ($400-$600)"
    else:
        return "Luxury ($600+)"

def save_insights_to_db(ai_insights, stats):
    """
    Save generated insights to database
    """
    try:
        for category, data in ai_insights.items():
            insight = MarketInsight(
                route="ALL_ROUTES",
                insight_type=category,
                insight_data=data,
                ai_summary=data.get('summary', ''),
                confidence_score=0.8  # Default confidence
            )
            db.session.add(insight)
        
        db.session.commit()
        
    except Exception as e:
        logging.error(f"Error saving insights to database: {str(e)}")

def format_insights_for_display(ai_insights):
    """
    Format AI insights for web display
    """
    try:
        formatted_insights = []
        
        for category, data in ai_insights.items():
            insight = {
                'title': category.replace('_', ' ').title(),
                'summary': data.get('summary', ''),
                'details': [],
                'category': category
            }
            
            # Add specific details based on category
            if 'insights' in data:
                insight['details'].extend(data['insights'])
            if 'recommendations' in data:
                insight['details'].extend(data['recommendations'])
            if 'opportunities' in data:
                insight['details'].extend(data['opportunities'])
            
            formatted_insights.append(insight)
        
        return formatted_insights
        
    except Exception as e:
        logging.error(f"Error formatting insights: {str(e)}")
        return []

def generate_basic_analysis(flight_data):
    """
    Generate basic analysis when AI is not available
    """
    try:
        insights = []
        
        if not flight_data:
            return [{'title': 'No Data Available', 'summary': 'No flight data available for analysis', 'details': [], 'category': 'error'}]
        
        stats = calculate_statistics(flight_data)
        
        # Route analysis
        route_counts = defaultdict(int)
        for flight in flight_data:
            route = f"{flight.origin}-{flight.destination}"
            route_counts[route] += 1
        
        popular_routes = sorted(route_counts.items(), key=lambda x: x[1], reverse=True)[:5]
        
        insights.append({
            'title': 'Popular Routes',
            'summary': f'Analysis of {stats["total_flights"]} flights across {stats["unique_routes"]} routes',
            'details': [f"{route}: {count} flights" for route, count in popular_routes],
            'category': 'routes'
        })
        
        # Price analysis
        if stats['avg_price'] > 0:
            insights.append({
                'title': 'Price Analysis',
                'summary': f'Average flight price: ${stats["avg_price"]:.2f}',
                'details': [
                    f"Minimum price: ${stats['min_price']:.2f}",
                    f"Maximum price: ${stats['max_price']:.2f}",
                    f"Price range: ${stats['max_price'] - stats['min_price']:.2f}"
                ],
                'category': 'pricing'
            })
        
        return insights
        
    except Exception as e:
        logging.error(f"Error generating basic analysis: {str(e)}")
        return [{'title': 'Analysis Error', 'summary': 'Error generating analysis', 'details': [], 'category': 'error'}]

def generate_insights(flight_data):
    """
    Main function to generate insights from flight data
    """
    try:
        # Analyze market trends
        insights = analyze_market_trends(flight_data)
        
        return insights
        
    except Exception as e:
        logging.error(f"Error generating insights: {str(e)}")
        return []
